# v2 migration branch only, TEMPORARY — delete at cutover. Runs the exact
# build half of deploy_dashboard.yml (dbt prod build, site meta, Evidence on
# the BigQuery source) but uploads the site as a plain artifact instead of
# deploying, so the six pages can be verified before anything goes live.
name: v2 dashboard build check

concurrency:
  group: v2-dashboard-check
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [v2-bigquery]
    paths:
      - ".github/workflows/v2_dashboard_check.yml"

jobs:
  build:
    if: ${{ vars.GCP_PROJECT != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      DBT_TARGET: prod
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: dbt build (models + tests)
        working-directory: dbt
        run: DBT_PROFILES_DIR=. uv run dbt build

      - name: dbt docs
        working-directory: dbt
        run: DBT_PROFILES_DIR=. uv run dbt docs generate --static

      - name: Build site meta + quality tables
        run: uv run python -m scripts.build_site_meta

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: |
          npm run sources
          npm run build

      - name: Upload site for inspection
        uses: actions/upload-artifact@v4
        with:
          name: v2-dashboard-site
          path: dashboard/build/fdic-bank-health-monitor
