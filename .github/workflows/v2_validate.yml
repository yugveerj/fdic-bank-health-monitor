# v2 migration branch only: the Phase B validation — build all marts on
# BigQuery (dev dataset) with every dbt test, then the mart parity gate
# against production MotherDuck, then the 2023 backtest with the frozen rank
# assertions. Manual trigger: this is the gate you run deliberately, not on
# every push. Results feed docs/migration_validation.md.
name: v2 BigQuery validation

concurrency:
  group: v2-bigquery-validate
  cancel-in-progress: false

on:
  workflow_dispatch:

jobs:
  validate:
    if: ${{ vars.GCP_PROJECT != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: dbt build on BigQuery (dev dataset, all models + tests)
        working-directory: dbt
        env:
          DBT_TARGET: dev
        run: DBT_PROFILES_DIR=. uv run dbt build

      - name: Mart parity gate vs production MotherDuck (1e-9)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FDIC_DB_PATH: "md:fdic_bank_health"
          BQ_MARTS_DATASET: dbt_dev
        run: uv run python -m scripts.mart_parity_check

      - name: 2023 backtest on BigQuery (frozen rank assertions)
        env:
          FDIC_PROD_DATASET: dbt_dev
        run: uv run python -m scripts.run_backtest

      - name: Exhibit drift vs committed CSVs
        run: git status --short docs/backtest && git diff --stat docs/backtest || true

      - name: Upload regenerated exhibits
        uses: actions/upload-artifact@v4
        with:
          name: backtest-exhibits
          path: docs/backtest/*.csv
