# TEMPORARY — the two deliberate steps that retire the v1 warehouse, each an
# explicit manual dispatch. Removed once MotherDuck is gone (with the rest of
# the DuckDB-era code). Owner approved the decommission 2026-07-05.
name: MotherDuck decommission

on:
  workflow_dispatch:
    inputs:
      action:
        description: "snapshot = export everything to GCS cold storage (read-only). drop-database = DELETE the MotherDuck database (only after a verified snapshot)."
        required: true
        type: choice
        options:
          - snapshot
          - drop-database

jobs:
  snapshot:
    if: ${{ inputs.action == 'snapshot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF, for the GCS upload
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      GCS_ARCHIVE_BUCKET: ${{ vars.GCS_ARCHIVE_BUCKET }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      FDIC_DB_PATH: "md:fdic_bank_health"
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Export every table to GCS cold storage
        run: uv run python -m scripts.motherduck_snapshot

  drop-database:
    if: ${{ inputs.action == 'drop-database' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Drop the MotherDuck database
        run: |
          uv run python -c "
          import duckdb
          con = duckdb.connect('md:')
          before = [r[0] for r in con.execute('SHOW DATABASES').fetchall()]
          assert 'fdic_bank_health' in before, f'nothing to drop: {before}'
          con.execute('DROP DATABASE fdic_bank_health')
          after = [r[0] for r in con.execute('SHOW DATABASES').fetchall()]
          assert 'fdic_bank_health' not in after
          print('dropped fdic_bank_health; remaining databases:', after)
          "
