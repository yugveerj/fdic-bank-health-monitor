# Daily: check whether the FDIC has published a new quarter; if so, run the
# full FDIC ingestion and redeploy. The dispatch input proves the trigger path
# without waiting ~90 days: set high_water_override to e.g. 20251231 and the
# detector sees the live 2026-Q1 data as "new".
name: Quarterly check

on:
  schedule:
    - cron: "40 7 * * *"
  workflow_dispatch:
    inputs:
      high_water_override:
        description: "Pretend the warehouse high-water REPDTE is this (YYYYMMDD) — test mode"
        required: false
        default: ""

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF
    outputs:
      new_quarter: ${{ steps.check.outputs.new_quarter }}
      latest_quarter: ${{ steps.check.outputs.latest_quarter }}
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      FDIC_HIGH_WATER_OVERRIDE: ${{ inputs.high_water_override }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Compare API latest quarter to warehouse high-water mark
        id: check
        run: uv run python -m scripts.check_new_quarter

  ingest:
    needs: detect
    if: needs.detect.outputs.new_quarter == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Full ingestion into BigQuery
        run: uv run python -m ingestion.run_all

  deploy:
    needs: [detect, ingest]
    if: needs.detect.outputs.new_quarter == 'true'
    uses: ./.github/workflows/deploy_dashboard.yml
    secrets: inherit
    permissions:
      pages: write
      id-token: write
      contents: read

  notify:
    needs: [detect, deploy]
    if: needs.detect.outputs.new_quarter == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      # a new quarter is a real event worth surfacing, not just a silent redeploy.
      # a repo issue notifies the owner through GitHub with no external service.
      - name: Open an issue announcing the new quarter
        env:
          GH_TOKEN: ${{ github.token }}
          QUARTER: ${{ needs.detect.outputs.latest_quarter }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "New FDIC quarter landed: ${QUARTER}" \
            --body "The daily check found FDIC report date **${QUARTER}**. The pipeline re-ingested and redeployed the dashboard automatically — worth a look."
