# Re-ingest FDIC data into MotherDuck, then rebuild and deploy the site.
# This is the ONLY workflow that calls the FDIC API. Manual for now; the
# weekly/quarterly schedules attach here when automation ships.
name: Refresh data

on:
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      FDIC_DB_PATH: "md:fdic_bank_health"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Ingest FDIC data into MotherDuck
        run: uv run python -m ingestion.run_all

  deploy:
    needs: ingest
    uses: ./.github/workflows/deploy_dashboard.yml
    secrets: inherit
    permissions:
      pages: write
      id-token: write
      contents: read
