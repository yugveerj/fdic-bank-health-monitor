# Weekly: pull fresh FRED H.8 observations, then rebuild and deploy the site.
# H.8 publishes Friday afternoons US time; this runs Saturdays 02:15 UTC.
name: Weekly refresh

on:
  schedule:
    - cron: "15 2 * * 6"
  workflow_dispatch:

jobs:
  ingest-fred:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Ingest FRED H.8 into BigQuery
        run: uv run python -m ingestion.fred_h8

      # sector-level forecasts only (hard rule) — recomputed weekly from the
      # fresh H.8 observations, published per the beat-the-baseline rule
      - name: Recompute sector forecasts
        run: uv run python -m forecasting.h8_forecast

      # surface a stale feed instead of deploying old H.8 numbers silently;
      # non-blocking on purpose — stale macro series shouldn't hold back the
      # rest of the site, but the failed check flags the run for a look
      - name: Check the FRED feed didn't go stale
        working-directory: dbt
        continue-on-error: true
        env:
          DBT_TARGET: prod
        run: DBT_PROFILES_DIR=. uv run dbt source freshness --select source:raw_fdic.raw_fred_h8

  deploy:
    needs: ingest-fred
    uses: ./.github/workflows/deploy_dashboard.yml
    secrets: inherit
    permissions:
      pages: write
      id-token: write
      contents: read
