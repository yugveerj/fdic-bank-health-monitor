name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (reads .python-version; caching on by default)
        # SHA-pinned: setup-uv publishes no moving major tag (@v8 does not resolve),
        # and a SHA pin can't be silently retargeted the way a tag can
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      # full dbt build on a committed sample of real API rows — never touches
      # the FDIC API and needs no secrets, so it runs on fork PRs too
      - name: Build fixture warehouse
        run: uv run python -m scripts.build_ci_warehouse

      - name: dbt build (models + tests on the fixture)
        working-directory: dbt
        env:
          DBT_TARGET: backtest
          BACKTEST_DB_PATH: ../ci_warehouse.duckdb
        run: DBT_PROFILES_DIR=. uv run dbt build

      - name: Backtest end to end on the fixture
        # keeps the README's one-command promise honest on every PR
        env:
          FDIC_PROD_DB: ci_warehouse.duckdb
          BACKTEST_DB_PATH: ci_backtest.duckdb
          BACKTEST_OUT_DIR: /tmp/backtest_ci
        run: uv run python -m scripts.run_backtest
