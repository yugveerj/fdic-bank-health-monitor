# The full data pipeline + deploy, on every push to main:
#   ingest FDIC data into MotherDuck -> dbt build (models + tests) -> dbt docs
#   -> Evidence static build -> one GitHub Pages artifact (site + /dbt-docs/).
# The scheduled refresh jobs will reuse this exact path via workflow_dispatch.
name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      FDIC_DB_PATH: "md:fdic_bank_health"
      DBT_TARGET: md
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # SHA-pinned: setup-uv publishes no moving major tag
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Ingest FDIC data into MotherDuck
        run: uv run python -m ingestion.run_all

      - name: dbt build (models + tests)
        working-directory: dbt
        run: DBT_PROFILES_DIR=. uv run dbt build

      - name: dbt docs
        working-directory: dbt
        run: DBT_PROFILES_DIR=. uv run dbt docs generate --static

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: |
          npm run sources
          npm run build

      - name: Add dbt docs to the site
        run: |
          mkdir -p dashboard/build/fdic-bank-health-monitor/dbt-docs
          cp dbt/target/static_index.html dashboard/build/fdic-bank-health-monitor/dbt-docs/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard/build/fdic-bank-health-monitor'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
