# Rebuild and deploy the site FROM THE WAREHOUSE — no FDIC API calls here.
# Pushes to main rebuild models/docs/dashboard against MotherDuck as-is;
# only the refresh workflow (schedule / manual) re-ingests source data and
# then calls this one.
name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      FDIC_DB_PATH: "md:fdic_bank_health"
      DBT_TARGET: md
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: dbt build (models + tests)
        working-directory: dbt
        run: DBT_PROFILES_DIR=. uv run dbt build

      - name: dbt docs
        working-directory: dbt
        run: DBT_PROFILES_DIR=. uv run dbt docs generate --static

      - name: Export dashboard marts from the warehouse
        run: uv run python -m scripts.export_dashboard_db

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: |
          npm run sources
          npm run build

      - name: Add dbt docs to the site
        run: |
          mkdir -p dashboard/build/fdic-bank-health-monitor/dbt-docs
          cp dbt/target/static_index.html dashboard/build/fdic-bank-health-monitor/dbt-docs/index.html

      - name: Strip the framework's vendor share tag
        # @evidence_dev twitter:site is hardcoded in @evidence-dev/preprocess;
        # removing it post-build is the only place that survives npm ci. The
        # handle also lives in compiled JS (re-added on hydration), so both go.
        run: |
          find dashboard/build -name '*.html' -exec \
            sed -i 's|<meta name="twitter:site" content="@evidence_dev" */*>||g' {} +
          find dashboard/build -name '*.js' -exec sed -i 's|@evidence_dev||g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard/build/fdic-bank-health-monitor'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # job-level on purpose: workflow-level concurrency is ignored when this
    # workflow runs via workflow_call (the refresh workflows), so only this
    # guard actually serializes ALL Pages deployments
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # defaults give up after 10 status errors / 10 minutes, which is what
          # kept failing overnight while the Pages backend was throttling
          error_count: 30
          timeout: 1200000
