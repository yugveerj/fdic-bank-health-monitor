# v2 migration branch only: full ingest into BigQuery `fdic_raw`, then the raw
# parity check against the production MotherDuck warehouse (Phase A gate).
# Auth is keyless: Workload Identity Federation via google-github-actions/auth.
# The ingest job skips cleanly until the GCP repo variables are set — see
# .env.example and PROJECT_SPEC_V2.md §1 for what the console setup provides.
name: v2 BigQuery ingest

# overlapping ingests would interleave writes and read half-merged state in
# the parity step; queue instead (never cancel a run mid-MERGE)
concurrency:
  group: v2-bigquery-ingest
  cancel-in-progress: false

on:
  push:
    branches: [v2-bigquery]
    paths:
      - "ingestion/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/v2_ingest.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest -q

  ingest-bigquery:
    needs: checks
    # repo variables (not secrets — none of these are sensitive): GCP_PROJECT,
    # GCP_WIF_PROVIDER (projects/N/locations/global/workloadIdentityPools/P/providers/R),
    # GCP_SA_EMAIL (the service account CI impersonates)
    if: ${{ vars.GCP_PROJECT != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF: exchange the Actions OIDC token for GCP credentials
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python project
        run: uv sync --locked

      - name: Full ingest into BigQuery fdic_raw
        run: uv run python -m ingestion.run_all

      - name: Raw parity check vs production MotherDuck
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FDIC_DB_PATH: "md:fdic_bank_health"
        run: uv run python -m scripts.raw_parity_check
