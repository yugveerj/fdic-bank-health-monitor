# BigQuery targets, all env-var-driven. Auth is Application Default
# Credentials everywhere: `gcloud auth application-default login` locally,
# Workload Identity Federation in CI — dbt's `oauth` method picks up both.
# Dataset names per PROJECT_SPEC_V2.md §2: dbt_dev (dev), analytics (prod
# marts); the backtest target builds into its own disposable dataset.

fdic_bank_health:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: dbt_dev
      location: US
      threads: 4
    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: analytics
      location: US
      threads: 4
    backtest:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: "{{ env_var('BACKTEST_DATASET', 'dbt_backtest') }}"
      location: US
      threads: 4
