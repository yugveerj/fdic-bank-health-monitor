name: fdic_bank_health
version: "1.0"
profile: fdic_bank_health

model-paths: ["models"]
test-paths: ["tests"]
target-path: target

models:
  fdic_bank_health:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
      # partition + cluster + incremental-merge on the workhorse table: at
      # megabyte scale this is pattern-practice rather than a performance
      # need — see decisions.md (materialization set in the model file)
      fct_bank_quarters:
        +partition_by: {field: report_date, data_type: date}
        +cluster_by: [cert]
