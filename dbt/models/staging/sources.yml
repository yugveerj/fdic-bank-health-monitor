version: 2

sources:
  - name: raw_fdic
    description: Raw FDIC BankFind Suite API data, landed by ingestion/run_all.py
    # env-switchable so the backtest can point the whole project at its frozen
    # raw copies (scripts/run_backtest.py) — same mechanism as v1, where the
    # frozen .duckdb file carried its own raw tables
    schema: "{{ env_var('BQ_RAW_DATASET', 'fdic_raw') }}"
    freshness:
      warn_after: {count: 130, period: day}   # quarterly data + ~60-day publication lag
      error_after: {count: 200, period: day}
    loaded_at_field: "parse_timestamp('%Y%m%d', REPDTE)"
    tables:
      - name: raw_fdic_financials
        description: One row per bank-quarter, banks > $1B in any quarter since 2019-Q1
      - name: raw_fdic_institutions
        description: One row per FDIC-insured institution, active and inactive
        freshness: null
      - name: raw_fdic_failures
        description: One row per failure event since 1934
        freshness: null
      - name: raw_fred_h8
        description: Weekly FRED H.8 aggregates (series in docs/fred_h8_series.md)
        # H.8 publishes Fridays; a feed more than three weeks stale means the
        # weekly ingest quietly stopped landing observations.
        loaded_at_field: "cast(obs_date as timestamp)"
        freshness:
          warn_after: {count: 10, period: day}
          error_after: {count: 21, period: day}

  - name: ga4_sample
    description: >
      Google's obfuscated GA4 ecommerce sample (Merchandise Store), a fixed
      public dataset covering 2020-11-01 to 2021-01-31. Stands in for the
      own-property export so the product-analytics models can be built and
      tested before Phase E.
    database: bigquery-public-data
    schema: ga4_obfuscated_sample_ecommerce
    freshness: null
    tables:
      - name: events
        identifier: "events_*"
        description: Sharded GA4 event export, one table per day.

  - name: ga4_export
    description: >
      Own-property GA4 daily export (property 544257899, linked 2026-07-05).
      The dataset materializes when the first daily export lands; until then
      the source AND its staging model are disabled behind ga4_export_enabled,
      because dbt docs generate catalogs every enabled source's dataset and a
      404 there fails the whole deploy.
    config:
      enabled: "{{ var('ga4_export_enabled', false) }}"
    schema: "{{ env_var('GA4_EXPORT_DATASET', 'analytics_544257899') }}"
    freshness: null
    tables:
      - name: events
        identifier: "events_*"
        description: Sharded GA4 event export, one table per day.
