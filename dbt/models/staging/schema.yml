version: 2

models:
  - name: stg_fdic__financials
    description: Typed bank-quarter financials. Dollar fields in thousands, ratios in percent.
    columns:
      - name: cert
        tests: [not_null]
      - name: report_date
        tests: [not_null]

  - name: stg_fdic__institutions
    description: Typed institution attributes, active and inactive.
    columns:
      - name: cert
        tests: [unique, not_null]

  - name: stg_fdic__failures
    description: Typed failure events. cert can be NULL on Depression-era records.
    columns:
      - name: failure_id
        tests: [unique, not_null]

  - name: stg_fred__h8
    description: Weekly H.8 aggregates in billions; missing observations dropped.
    columns:
      - name: series_id
        tests: [not_null]
      - name: obs_date
        tests: [not_null]

  - name: stg_ga4_sample__events
    description: >
      Flattened GA4 events from Google's obfuscated ecommerce sample,
      2020-11-01 to 2021-01-31. One row per event; session_key is null on
      events without a ga_session_id param.
    columns:
      - name: event_date
        tests: [not_null]
      - name: event_ts
        tests: [not_null]
      - name: event_name
        tests: [not_null]

  - name: stg_ga4__events
    description: >
      Flattened GA4 events from the project's own property — identical shape
      to stg_ga4_sample__events via the shared macro. Disabled until Phase E
      flips the ga4_export_enabled var.
